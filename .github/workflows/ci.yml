name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr libgl1

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest --cov=poker_coach --cov-report=term-missing
